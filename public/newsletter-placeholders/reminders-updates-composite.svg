<svg xmlns="http://www.w3.org/2000/svg" width="4000" height="1800" viewBox="0 0 4000 1800" role="img" aria-labelledby="title desc">
  <title id="title">Reminders and updates composite placeholder</title>
  <desc id="desc">Drop in one wide reminders image that replaces all four reminder cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2f7" />
      <stop offset="100%" stop-color="#dce3ec" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="4000" height="1800" fill="url(#bg)" rx="24" ry="24" />
  <rect x="90" y="90" width="3820" height="1620" fill="none" stroke="#64748b" stroke-width="8" stroke-dasharray="20 18" rx="18" ry="18" />
  <text x="180" y="280" fill="#1e293b" font-family="Arial Black, Arial, sans-serif" font-size="126" letter-spacing="5">
    REMINDERS &amp; UPDATES COMPOSITE IMAGE
  </text>
  <text x="180" y="470" fill="#334155" font-family="Arial, sans-serif" font-size="92">
    Replace this file with your final PNG artwork.
  </text>
  <text x="180" y="620" fill="#475569" font-family="Arial, sans-serif" font-size="76">
    Recommended export: 4000 x 1800 px (20:9)
  </text>
  <text x="180" y="760" fill="#475569" font-family="Arial, sans-serif" font-size="76">
    Filename: reminders-updates-composite-user.png
  </text>
</svg>
